# catalogs/datalake_manifest.yaml
# ──────────────────────────────────────────────────────────────────────────
# 메타 권위 = SSOT (Single Source of Truth). 적재도구의 파일시스템 추론(파일명 유도
# datalake_id·폴더 파싱 vid) 폐기 — manifest 명시값이 권위. 휴리스틱은 작성용 seed (D-173).
#
# ingest(tools/datalake_ingest.py)는 이 파일을 "읽기만" 한다(파생 0):
#   datalake_id · vid · modality · function · site · company · format · encoding = manifest 권위
#   scalar 컬럼 이름·dtype = 파일 헤더 실측(사실 읽기)
#   group descriptor(waveform/image_set) = manifest 권위 + 파일 검산
#   node · capture = provenance만 (DB 미적재 — entries 14컬럼에 없음, D-175)
#
# DL-2 정합: spec-1 §1-2(사)/§1-5/§1-6, decisions D-159~D-177.
# 건수: lines.yaml hint_dataset 34건 − #15 이종묶음 2건(아래 excluded) = 32건 (D-177).
# path = ~/FINAL/1_data 기준 상대경로 (ingest 가 --root 와 결합 → 복사 소스).
# ──────────────────────────────────────────────────────────────────────────
#
# [작성 메모 — Master/병갑 큐레이션 결정 지점]
#  (1) order_planning: datalake_id = node 기준 'order_planning' (cp949 를 id 에 안 박음, D-177).
#      lines.yaml hint_dataset 도 'order_planning' 정정 완료(3473c06) + Master 룰링 확정(2026-06-11)
#      — 메모 클로즈. ※ 합성 더미 order_cp949.csv(data/synthetic, 챌린지 1)는 별개 네임스페이스.
#  (2) modality = 데이터 "형태" 기준 (D-163 MCP 라우팅 키): 연속 센서 신호=timeseries / 이산 사건 레코드=event-log.
#      ★ 판정/라벨 컬럼(PASS_YN·NGmark·Label·result·검사결과)은 function·학습 타겟이지 modality 아님 — 라벨로 분류 금지.
#      event-log 2건 (형태 실측 확정, Master 검증 2026-06-09):
#        L4_ict_checker    — 동일 검사일시에 부품별 다중 행(1검사=N행), 측정+검사결과 = 이산 검사 레코드
#        L4_ict_inspection — TIMEVALUE 사건 단위 검사 항목 레코드 = 이산 검사 레코드
#      timeseries 유지(라벨 보유하나 연속 시계열): press_forming(449K행 공정센서+PASS_YN) · injection_optimize(TimeStamp 1분규칙
#        +NGmark) · injection_production(사출 shot 측정+Label) · precision_machine(regDate 139초 폴링, 1시각=1행, broken=라벨).
#      ※ "archive event-log 9건"(docs/archive)은 구버전(CLAUDE.md §7 폐기결정 혼재)이라 권위 아님 — 라이브 spec/decisions 엔
#         event-log 건수 명시 없음(order 1건만, D-177). 형태 실측이 분류 근거. A단계 [추론] 2건→오분류 6건→형태확정 2건.
#  (3) xlsx/xltx/이미지 = 바이너리 컨테이너 → encoding: binary (텍스트 코덱 N/A).
#      format 으로 원본(xlsx/xltx/jpg/bmp/png) 구분 = D-174 "format/encoding 분리".  [추론]
#  (4) company: 현 KAMP = 단일 테넌트 'kamp' degenerate (site 형제, D-174). 멀티테넌트 도래 시 권위값.
#  (5) cp949 3건(order_planning·L4_ict_checker·L4_ict_inspection): encoding=cp949 +
#      normalize_to=utf-8 (적재 시 canonical 정규화, 원본 format/encoding 은 lineage 보존, D-177).

version: 1
source: kamp
site: kamp                       # KAMP 단일 데모 site (경로서 미도출 seed)
company: kamp                    # 단일 테넌트 degenerate (D-174)

