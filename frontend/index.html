<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>manufacturing-mcp · Inspector</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Archivo:wght@500;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0e11;
    --panel: #14181d;
    --panel-2: #1b2127;
    --line: #2a323b;
    --text: #d6dde4;
    --muted: #7b8794;
    --accent: #ff6b35;      /* 산업용 오렌지 (경고/액션) */
    --ok: #4cc38a;
    --warn: #f5a623;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Archivo', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    padding: 0;
    background-image: radial-gradient(circle at 1px 1px, #ffffff08 1px, transparent 0);
    background-size: 28px 28px;
  }
  header {
    border-bottom: 1px solid var(--line);
    padding: 18px 28px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, #14181d 0%, #0b0e11 100%);
  }
  header h1 {
    font-family: var(--display); font-weight: 900; font-size: 18px;
    letter-spacing: -0.5px; text-transform: uppercase;
  }
  header h1 .dot { color: var(--accent); }
  .health { display: flex; gap: 14px; font-size: 11px; color: var(--muted); }
  .badge { padding: 2px 8px; border: 1px solid var(--line); border-radius: 2px; }
  .badge.up { color: var(--ok); border-color: #2c5a44; }
  .badge.down { color: var(--accent); border-color: #5a322c; }
  main { padding: 28px; max-width: 1100px; margin: 0 auto; }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
  select, button {
    font-family: var(--mono); font-size: 13px;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); padding: 9px 14px; border-radius: 3px;
  }
  button {
    background: var(--accent); color: #0b0e11; font-weight: 700;
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;
    transition: transform 0.08s ease, filter 0.15s ease;
  }
  button:hover { filter: brightness(1.1); }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: 0.4; cursor: wait; }
  .panel {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 4px; padding: 20px; margin-bottom: 18px;
  }
  .panel h2 {
    font-family: var(--display); font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted);
    margin-bottom: 14px; border-bottom: 1px solid var(--line); padding-bottom: 8px;
  }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); }
  .stat { background: var(--panel-2); padding: 14px; }
  .stat .k { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat .v { font-family: var(--display); font-size: 24px; font-weight: 900; color: var(--text); margin-top: 4px; }
  .flags { display: flex; flex-direction: column; gap: 8px; }
  .flag { padding: 8px 12px; background: #2a1f17; border-left: 3px solid var(--warn); font-size: 12px; }
  .flag.none { background: var(--panel-2); border-left-color: var(--ok); color: var(--muted); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  td.mixed { color: var(--warn); }
  pre {
    background: #0b0e11; border: 1px solid var(--line); border-radius: 3px;
    padding: 14px; overflow-x: auto; font-size: 11.5px; color: #a8d8c4;
  }
  .empty { color: var(--muted); text-align: center; padding: 40px; font-style: italic; }
  .pulse { animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
</style>
</head>
<body>
<header>
  <h1>MANUFACTURING<span class="dot">·</span>MCP <span style="font-weight:500;font-size:11px;color:var(--muted)">/ inspector</span></h1>
  <div class="health" id="health">
    <span class="badge" id="b-backend">backend ?</span>
    <span class="badge" id="b-llm">llm ?</span>
    <span class="badge" id="b-mcp">mcp ?</span>
  </div>
</header>

<main>
  <div class="controls">
    <select id="dataset"><option>로딩 중...</option></select>
    <button id="run">▶ INSPECT</button>
    <span id="status" style="color:var(--muted);font-size:11px"></span>
  </div>

  <div id="result">
    <div class="panel"><div class="empty">데이터셋을 선택하고 INSPECT를 누르세요.<br>Inspector가 MCP 도구로 프로파일을 수집하고 Gemma가 해석합니다.</div></div>
  </div>
</main>

<script>
const API = ''; // 동일 오리진 (backend가 서빙)

async function loadHealth() {
  try {
    const h = await (await fetch(`${API}/api/health`)).json();
    setBadge('b-backend', 'backend', h.backend === 'ok');
    setBadge('b-llm', 'llm', h.llm && h.llm.ollama === 'up');
    setBadge('b-mcp', 'mcp', h.mcp_timeseries && h.mcp_timeseries.status === 'ok');
  } catch (e) { /* ignore */ }
}
function setBadge(id, label, up) {
  const el = document.getElementById(id);
  el.textContent = `${label} ${up ? '●' : '○'}`;
  el.className = 'badge ' + (up ? 'up' : 'down');
}

async function loadDatasets() {
  try {
    const d = await (await fetch(`${API}/api/datasets`)).json();
    const sel = document.getElementById('dataset');
    sel.innerHTML = '';
    (d.datasets || []).forEach(name => {
      const o = document.createElement('option');
      o.value = name; o.textContent = name; sel.appendChild(o);
    });
    if (!d.datasets || !d.datasets.length) sel.innerHTML = '<option>데이터셋 없음 (generate.py 실행 필요)</option>';
  } catch (e) {
    document.getElementById('dataset').innerHTML = '<option>백엔드 연결 실패</option>';
  }
}

document.getElementById('run').addEventListener('click', async () => {
  const ds = document.getElementById('dataset').value;
  const btn = document.getElementById('run');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = 'Inspector 실행 중... (LLM 해석 포함, 26B면 수십 초 소요 가능)';
  status.className = 'pulse';
  try {
    const p = await (await fetch(`${API}/api/inspect?dataset_id=${encodeURIComponent(ds)}`)).json();
    render(p);
  } catch (e) {
    document.getElementById('result').innerHTML = `<div class="panel"><div class="empty">실패: ${e}</div></div>`;
  } finally {
    btn.disabled = false; status.textContent = ''; status.className = '';
  }
});

function render(p) {
  const flags = (p.deterministic_flags || []);
  const flagsHtml = flags.length
    ? flags.map(f => `<div class="flag">⚠ ${f}</div>`).join('')
    : '<div class="flag none">✓ 결정론적 챌린지 미검출 (clean)</div>';

  const colsHtml = (p.columns || []).map(c => `
    <tr>
      <td>${c.name}</td>
      <td class="${c.mixed_dtype_suspected ? 'mixed' : ''}">${c.dtype}${c.mixed_dtype_suspected ? ' ⚠혼재' : ''}</td>
      <td>${c.null_count}</td>
      <td>${c.n_unique}</td>
    </tr>`).join('');

  document.getElementById('result').innerHTML = `
    <div class="panel">
      <h2>Profile · ${p.dataset_id}</h2>
      <div class="stat-grid">
        <div class="stat"><div class="k">rows</div><div class="v">${(p.n_rows ?? '–').toLocaleString()}</div></div>
        <div class="stat"><div class="k">cols</div><div class="v">${p.n_cols ?? '–'}</div></div>
        <div class="stat"><div class="k">encoding</div><div class="v" style="font-size:15px">${p.encoding ?? '–'}</div></div>
        <div class="stat"><div class="k">flags</div><div class="v" style="color:${flags.length?'var(--warn)':'var(--ok)'}">${flags.length}</div></div>
      </div>
    </div>
    <div class="panel">
      <h2>Deterministic Flags (MCP 도구가 LLM 없이 감지)</h2>
      <div class="flags">${flagsHtml}</div>
    </div>
    <div class="panel">
      <h2>Columns</h2>
      <table><thead><tr><th>name</th><th>dtype</th><th>nulls</th><th>unique</th></tr></thead>
      <tbody>${colsHtml}</tbody></table>
    </div>
    <div class="panel">
      <h2>LLM Interpretation (Gemma)</h2>
      <pre>${JSON.stringify(p.llm_interpretation, null, 2)}</pre>
    </div>`;
}

loadHealth(); loadDatasets();
setInterval(loadHealth, 8000);
</script>
</body>
</html>
