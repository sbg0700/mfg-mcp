<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>manufacturing-mcp · Inspector</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Archivo:wght@500;700;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0e11;
    --panel: #14181d;
    --panel-2: #1b2127;
    --line: #2a323b;
    --text: #d6dde4;
    --muted: #7b8794;
    --accent: #ff6b35;      /* 산업용 오렌지 (경고/액션) */
    --ok: #4cc38a;
    --warn: #f5a623;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Archivo', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    padding: 0;
    background-image: radial-gradient(circle at 1px 1px, #ffffff08 1px, transparent 0);
    background-size: 28px 28px;
  }
  header {
    border-bottom: 1px solid var(--line);
    padding: 18px 28px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, #14181d 0%, #0b0e11 100%);
  }
  header h1 {
    font-family: var(--display); font-weight: 900; font-size: 18px;
    letter-spacing: -0.5px; text-transform: uppercase;
  }
  header h1 .dot { color: var(--accent); }
  .health { display: flex; gap: 14px; font-size: 11px; color: var(--muted); }
  .badge { padding: 2px 8px; border: 1px solid var(--line); border-radius: 2px; }
  .badge.up { color: var(--ok); border-color: #2c5a44; }
  .badge.down { color: var(--accent); border-color: #5a322c; }
  main { padding: 28px; max-width: 1100px; margin: 0 auto; }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
  select, button {
    font-family: var(--mono); font-size: 13px;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); padding: 9px 14px; border-radius: 3px;
  }
  button {
    background: var(--accent); color: #0b0e11; font-weight: 700;
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;
    transition: transform 0.08s ease, filter 0.15s ease;
  }
  button:hover { filter: brightness(1.1); }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: 0.4; cursor: wait; }
  .panel {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 4px; padding: 20px; margin-bottom: 18px;
  }
  .panel h2 {
    font-family: var(--display); font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted);
    margin-bottom: 14px; border-bottom: 1px solid var(--line); padding-bottom: 8px;
  }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); }
  .stat { background: var(--panel-2); padding: 14px; }
  .stat .k { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat .v { font-family: var(--display); font-size: 24px; font-weight: 900; color: var(--text); margin-top: 4px; }
  .flags { display: flex; flex-direction: column; gap: 8px; }
  .flag { padding: 8px 12px; background: #2a1f17; border-left: 3px solid var(--warn); font-size: 12px; }
  .flag.none { background: var(--panel-2); border-left-color: var(--ok); color: var(--muted); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  td.mixed { color: var(--warn); }
  pre {
    background: #0b0e11; border: 1px solid var(--line); border-radius: 3px;
    padding: 14px; overflow-x: auto; font-size: 11.5px; color: #a8d8c4;
  }
  .empty { color: var(--muted); text-align: center; padding: 40px; font-style: italic; }
  .pulse { animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  /* 권한 배지 + 계획 단계 */
  .step { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-bottom: 1px solid var(--line); }
  .step:last-child { border-bottom: none; }
  .step .ord { color: var(--muted); font-size: 11px; min-width: 18px; }
  .step .op { font-weight: 700; min-width: 150px; }
  .step .rat { color: var(--muted); font-size: 12px; flex: 1; }
  .perm { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 2px; letter-spacing: 0.5px; min-width: 34px; text-align: center; }
  .perm.L1 { background: #173a2a; color: var(--ok); }
  .perm.L2 { background: #3a2e17; color: var(--warn); }
  .perm.L3 { background: #3a1f1c; color: var(--accent); }
  .approval-banner { padding: 10px 14px; background: #3a2e17; border-left: 3px solid var(--warn); font-size: 12px; margin-bottom: 12px; }
  /* 실행 결과 + 승인 */
  .exec-step { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-bottom: 1px solid var(--line); }
  .exec-step:last-child { border-bottom: none; }
  .st { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 2px; min-width: 60px; text-align: center; }
  .st.done { background: #173a2a; color: var(--ok); }
  .st.awaiting_approval { background: #3a2e17; color: var(--warn); }
  .st.skipped { background: var(--panel-2); color: var(--muted); }
  .st.failed { background: #3a1f1c; color: var(--accent); }
  .approve-row { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: #2a2017; font-size: 12px; }
  .approve-row input { width: 16px; height: 16px; accent-color: var(--accent); }
  .lineage-tag { font-size: 10px; color: var(--muted); font-family: var(--mono); }
</style>
</head>
<body>
<header>
  <h1>MANUFACTURING<span class="dot">·</span>MCP <span style="font-weight:500;font-size:11px;color:var(--muted)">/ inspector</span></h1>
  <div class="health" id="health">
    <span class="badge" id="b-backend">backend ?</span>
    <span class="badge" id="b-llm">llm ?</span>
    <span class="badge" id="b-mcp">mcp ?</span>
  </div>
</header>

<main>
  <div class="controls">
    <select id="modality" title="모달리티 선택" style="border-color:var(--accent)"><option>모달리티...</option></select>
    <select id="dataset"><option>로딩 중...</option></select>
    <select id="model" title="LLM 모델 선택"><option>모델 로딩...</option></select>
    <button id="run">▶ INSPECT</button>
    <button id="runplan" style="background:var(--panel-2);color:var(--text);border:1px solid var(--accent)">▶ INSPECT + PLAN</button>
    <button id="runexec" style="background:var(--panel-2);color:var(--text);border:1px solid var(--ok)">▶ EXECUTE</button>
    <span id="status" style="color:var(--muted);font-size:11px"></span>
  </div>

  <div id="result">
    <div class="panel"><div class="empty">데이터셋을 선택하고 INSPECT를 누르세요.<br>Inspector가 MCP 도구로 프로파일을 수집하고 Gemma가 해석합니다.</div></div>
  </div>
</main>

<script>
const API = ''; // 동일 오리진 (backend가 서빙)

async function loadHealth() {
  try {
    const h = await (await fetch(`${API}/api/health`)).json();
    setBadge('b-backend', 'backend', h.backend === 'ok');
    setBadge('b-llm', 'llm', h.llm && h.llm.ollama === 'up');
    setBadge('b-mcp', 'mcp', h.mcp_timeseries && h.mcp_timeseries.status === 'ok');
  } catch (e) { /* ignore */ }
}
function setBadge(id, label, up) {
  const el = document.getElementById(id);
  el.textContent = `${label} ${up ? '●' : '○'}`;
  el.className = 'badge ' + (up ? 'up' : 'down');
}

async function loadModalities() {
  try {
    const m = await (await fetch(`${API}/api/modalities`)).json();
    const sel = document.getElementById('modality');
    sel.innerHTML = '';
    (m.modalities || []).forEach(item => {
      const o = document.createElement('option');
      o.value = item.modality;
      const dot = item.status === 'ok' ? ' ●' : ' ○';
      o.textContent = item.modality + dot;
      sel.appendChild(o);
    });
    // 모달리티 바뀌면 데이터셋 목록 갱신
    sel.addEventListener('change', loadDatasets);
  } catch (e) {
    document.getElementById('modality').innerHTML = '<option value="timeseries">timeseries</option>';
  }
}
function selectedModality() {
  const v = document.getElementById('modality').value;
  return (v && v.includes('image')) ? 'inspection-image' : 'timeseries';
}

async function loadModels() {
  try {
    const m = await (await fetch(`${API}/api/models`)).json();
    const sel = document.getElementById('model');
    sel.innerHTML = '';
    (m.installed || []).forEach(name => {
      const o = document.createElement('option');
      o.value = name;
      // 모델별 속도 힌트 라벨
      const hint = name.includes('e4b') ? ' (빠름)' : name.includes('26b') ? ' (정밀·느림)' : '';
      o.textContent = name + hint;
      if (name === m.default) o.selected = true;
      sel.appendChild(o);
    });
    if (!m.installed || !m.installed.length) sel.innerHTML = '<option value="">모델 없음</option>';
  } catch (e) {
    document.getElementById('model').innerHTML = '<option value="">로딩 실패</option>';
  }
}
function selectedModel() {
  const v = document.getElementById('model').value;
  return v && !v.includes('없음') && !v.includes('실패') ? v : null;
}

async function loadDatasets() {
  try {
    const d = await (await fetch(`${API}/api/datasets?modality=${encodeURIComponent(selectedModality())}`)).json();
    const sel = document.getElementById('dataset');
    sel.innerHTML = '';
    (d.datasets || []).forEach(name => {
      const o = document.createElement('option');
      o.value = name; o.textContent = name; sel.appendChild(o);
    });
    if (!d.datasets || !d.datasets.length) sel.innerHTML = '<option>데이터셋 없음 (generate.py 실행 필요)</option>';
  } catch (e) {
    document.getElementById('dataset').innerHTML = '<option>백엔드 연결 실패</option>';
  }
}

document.getElementById('run').addEventListener('click', () => runInspect(false));
document.getElementById('runplan').addEventListener('click', () => runInspect(true));
document.getElementById('runexec').addEventListener('click', () => runExecute([]));

// 승인된 step order를 모아 재실행
let lastDataset = null;
async function runExecute(approvedSteps) {
  const ds = approvedSteps.length ? lastDataset : document.getElementById('dataset').value;
  lastDataset = ds;
  const btns = document.querySelectorAll('.controls button');
  const status = document.getElementById('status');
  btns.forEach(b => b.disabled = true);
  status.textContent = approvedSteps.length
    ? `승인된 ${approvedSteps.length}개 단계 실행 중...`
    : 'Inspector → Planner → Executor 전체 체인 실행 중...';
  status.className = 'pulse';
  try {
    const r = await (await fetch(`${API}/api/execute`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({dataset_id: ds, approved_steps: approvedSteps, model: selectedModel(), modality: selectedModality()})
    })).json();
    render(r.profile);
    renderPlan(r.plan);
    renderExecution(r.execution);
  } catch (e) {
    document.getElementById('result').innerHTML = `<div class="panel"><div class="empty">실패: ${e}</div></div>`;
  } finally {
    btns.forEach(b => b.disabled = false); status.textContent = ''; status.className = '';
  }
}

function renderExecution(ex) {
  const results = ex.results || [];
  const pending = ex.pending_approvals || [];
  const stepsHtml = results.map(s => `
    <div class="exec-step">
      <span class="ord">${s.order}</span>
      <span class="perm ${s.permission_level}">${s.permission_level}</span>
      <span class="st ${s.status}">${s.status === 'awaiting_approval' ? '승인대기' : s.status === 'done' ? '완료' : s.status === 'skipped' ? '건너뜀' : '실패'}</span>
      <span class="op" style="min-width:120px">${s.operation}</span>
      <span class="rat">${s.detail || ''} ${s.lineage_id ? `<span class="lineage-tag">· lineage:${s.lineage_id.slice(0,8)}</span>` : ''}</span>
    </div>`).join('');

  // 승인 대기 단계가 있으면 1-click 승인 UI
  let approveHtml = '';
  if (pending.length) {
    const checks = pending.map(o => {
      const step = results.find(r => r.order === o);
      return `<div class="approve-row">
        <input type="checkbox" id="apv-${o}" value="${o}" checked>
        <label for="apv-${o}">단계 ${o} (${step.operation}, ${step.permission_level}) 승인</label>
      </div>`;
    }).join('');
    approveHtml = `
      <div style="margin-top:14px">
        <div style="color:var(--warn);font-size:11px;margin-bottom:8px">⚠ 아래 ${pending.length}개 단계는 승인이 필요합니다. 검토 후 승인하고 실행하세요.</div>
        ${checks}
        <button onclick="approveAndRun()" style="margin-top:10px;background:var(--accent);color:#0b0e11">✓ 승인하고 실행</button>
      </div>`;
  }

  const statusLine = ex.all_done
    ? `<span style="color:var(--ok)">✓ 모든 단계 완료</span> · 결과 저장: ${(ex.output_path||'').split('/').pop()}`
    : `<span style="color:var(--warn)">⏸ ${pending.length}개 단계 승인 대기 중</span>`;

  const panel = `
    <div class="panel">
      <h2>Execution Result · Executor</h2>
      <p style="color:var(--muted);font-size:12px;margin-bottom:12px">${statusLine}</p>
      ${stepsHtml}
      ${approveHtml}
    </div>`;
  document.getElementById('result').insertAdjacentHTML('beforeend', panel);
}

window.approveAndRun = function() {
  const checked = Array.from(document.querySelectorAll('.approve-row input:checked'))
    .map(el => parseInt(el.value));
  runExecute(checked);
};

async function runInspect(withPlan) {
  const ds = document.getElementById('dataset').value;
  const btns = [document.getElementById('run'), document.getElementById('runplan')];
  const status = document.getElementById('status');
  btns.forEach(b => b.disabled = true);
  status.textContent = withPlan
    ? 'Inspector → Planner 체인 실행 중... (LLM 2회 호출, 26B면 1분+ 가능)'
    : 'Inspector 실행 중...';
  status.className = 'pulse';
  try {
    if (withPlan) {
      const mq = selectedModel() ? `&model=${encodeURIComponent(selectedModel())}` : '';
      const r = await (await fetch(`${API}/api/plan?dataset_id=${encodeURIComponent(ds)}${mq}&modality=${encodeURIComponent(selectedModality())}`)).json();
      render(r.profile);
      renderPlan(r.plan);
    } else {
      const mq = selectedModel() ? `&model=${encodeURIComponent(selectedModel())}` : '';
      const p = await (await fetch(`${API}/api/inspect?dataset_id=${encodeURIComponent(ds)}${mq}&modality=${encodeURIComponent(selectedModality())}`)).json();
      render(p);
    }
  } catch (e) {
    document.getElementById('result').innerHTML = `<div class="panel"><div class="empty">실패: ${e}</div></div>`;
  } finally {
    btns.forEach(b => b.disabled = false); status.textContent = ''; status.className = '';
  }
}

function renderPlan(plan) {
  const steps = (plan.steps || []);
  const banner = plan.requires_approval
    ? `<div class="approval-banner">⚠ 이 계획에는 승인이 필요한 단계(L2/L3)가 포함되어 있습니다. Executor 실행 전 사용자 승인 필요.</div>`
    : `<div class="approval-banner" style="background:#173a2a;border-left-color:var(--ok);color:var(--ok)">✓ 모두 L1 자동 단계. 승인 없이 실행 가능.</div>`;
  const stepsHtml = steps.map(s => `
    <div class="step">
      <span class="ord">${s.order}</span>
      <span class="perm ${s.permission_level}">${s.permission_level}</span>
      <span class="op">${s.operation}${s.target_column ? `<span style="color:var(--muted);font-weight:400"> · ${s.target_column}</span>` : ''}</span>
      <span class="rat">${s.rationale || ''}</span>
    </div>`).join('');
  const panel = `
    <div class="panel">
      <h2>Preprocessing Plan · Planner (${steps.length} steps)</h2>
      <p style="color:var(--muted);font-size:12px;margin-bottom:12px">${plan.summary || ''}</p>
      ${banner}
      ${stepsHtml || '<div class="empty">계획 단계 없음</div>'}
    </div>`;
  document.getElementById('result').insertAdjacentHTML('beforeend', panel);
}

function render(p) {
  const flags = (p.deterministic_flags || []);
  const flagsHtml = flags.length
    ? flags.map(f => `<div class="flag">⚠ ${f}</div>`).join('')
    : '<div class="flag none">✓ 결정론적 챌린지 미검출 (clean)</div>';

  const colsHtml = (p.columns || []).map(c => `
    <tr>
      <td>${c.name}</td>
      <td class="${c.mixed_dtype_suspected ? 'mixed' : ''}">${c.dtype}${c.mixed_dtype_suspected ? ' ⚠혼재' : ''}</td>
      <td>${c.null_count}</td>
      <td>${c.n_unique}</td>
    </tr>`).join('');

  document.getElementById('result').innerHTML = `
    <div class="panel">
      <h2>Profile · ${p.dataset_id}</h2>
      <div class="stat-grid">
        <div class="stat"><div class="k">rows</div><div class="v">${(p.n_rows ?? '–').toLocaleString()}</div></div>
        <div class="stat"><div class="k">cols</div><div class="v">${p.n_cols ?? '–'}</div></div>
        <div class="stat"><div class="k">encoding</div><div class="v" style="font-size:15px">${p.encoding ?? '–'}</div></div>
        <div class="stat"><div class="k">flags</div><div class="v" style="color:${flags.length?'var(--warn)':'var(--ok)'}">${flags.length}</div></div>
      </div>
    </div>
    <div class="panel">
      <h2>Deterministic Flags (MCP 도구가 LLM 없이 감지)</h2>
      <div class="flags">${flagsHtml}</div>
    </div>
    <div class="panel">
      <h2>Columns</h2>
      <table><thead><tr><th>name</th><th>dtype</th><th>nulls</th><th>unique</th></tr></thead>
      <tbody>${colsHtml}</tbody></table>
    </div>
    <div class="panel">
      <h2>LLM Interpretation (Gemma)</h2>
      <pre>${JSON.stringify(p.llm_interpretation, null, 2)}</pre>
    </div>`;
}

loadHealth(); loadModalities(); loadDatasets(); loadModels();
setInterval(loadHealth, 8000);
</script>
</body>
</html>
