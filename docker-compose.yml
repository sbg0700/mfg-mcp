# docker-compose.yml вҖ” мҲҳм§Ғ мҠ¬лқјмқҙмҠӨ (ollama + postgres + mcp-timeseries + backend)
# н•өмӢ¬: мҪ”л“ңлҠ” нҳёмҠӨнҠём—җ л‘җкі  volumesлЎң л§ҲмҡҙнҠён•ңлӢӨ (CLAUDE.md В§1-5).
#       к°ңл°ң мӨ‘ мҪ”л“ң мҲҳм •мқҙ мҰүмӢң л°ҳмҳҒлҗЁ (--reload).
services:

  ollama:
    image: ollama/ollama:latest
    container_name: mfg-ollama
    ports: ["11434:11434"]
    volumes:
      - ollama_models:/root/.ollama       # лӘЁлҚё мҳҒмҶҚ (мһ¬мӢңмһ‘н•ҙлҸ„ мң м§Җ)
    deploy:
      resources:
        reservations:
          devices:
            - { driver: nvidia, count: all, capabilities: [gpu] }
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: mfg-postgres
    environment:
      POSTGRES_USER: mfg
      POSTGRES_PASSWORD: mfg_local_dev      # лӮҙл¶Җл§қ м „мҡ© (мҷёл¶Җ л…ём¶ң м•Ҳ н•Ё)
      POSTGRES_DB: manufacturing
    ports: ["5432:5432"]                     # лЎңм»¬ л””лІ„к№…мҡ©. мҡҙмҳҒм„  лӮҙл¶Җл§қл§Ң к¶ҢмһҘ
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro   # мөңмҙҲ 1нҡҢ мҠӨнӮӨл§Ҳ мғқм„ұ
    restart: unless-stopped

  mcp-timeseries:
    build: ./mcp-servers/timeseries
    container_name: mfg-mcp-timeseries
    environment:
      TIMESERIES_DATA_ROOT: /data/timeseries
    volumes:
      - ./mcp-servers/timeseries:/app                          # мҪ”л“ң л§ҲмҡҙнҠё
      - ./data/synthetic/timeseries:/data/timeseries:ro        # лҚ”лҜё лҚ°мқҙн„° л§ҲмҡҙнҠё
    ports: ["8101:8101"]
    restart: unless-stopped

  mcp-inspection-image:
    build: ./mcp-servers/inspection-image
    container_name: mfg-mcp-inspection-image
    environment:
      IMAGE_DATA_ROOT: /data/inspection-image
    volumes:
      - ./mcp-servers/inspection-image:/app                            # мҪ”л“ң л§ҲмҡҙнҠё
      - ./data/synthetic/inspection-image:/data/inspection-image:ro    # мқҙлҜём§Җ лҚ”лҜё л§ҲмҡҙнҠё
    ports: ["8102:8102"]
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: mfg-backend
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}                 # .envлЎң көҗмІҙ (e4bвҶ”26b)
      MCP_TIMESERIES_URL: http://mcp-timeseries:8101
      MCP_IMAGE_URL: http://mcp-inspection-image:8102
      IMAGE_DATA_ROOT: /repo/data/synthetic/inspection-image
    volumes:
      - .:/repo                                                # л ҲнҸ¬ м „мІҙ л§ҲмҡҙнҠё (agents/harness import)
    working_dir: /repo/backend
    ports: ["8000:8000"]
    depends_on: [ollama, postgres, mcp-timeseries, mcp-inspection-image]
    restart: unless-stopped

volumes:
  ollama_models:
  pg_data:
